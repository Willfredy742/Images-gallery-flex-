<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de imágenes adaptable</title>
</head>
<body>
    <header>
        <h1>Galería de imágenes adaptable</h1>
    </header>
    <main class="colmena">

        <article class="esbirro">
            <img src="photos/one.jpg" alt="Río cristalino que fluye pacíficamente en primer plano a través de un frondoso bosque verde iluminado por la luz del sol bajo un cielo despejado.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/two.jpg" alt="Lago de aguas verdosas y cristalinas que refleja montañas cubiertas de bosques y nubes bajas bajo un cielo azul brillante.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/three.jpg" alt="Río serpenteante que fluye a través de un cañón profundo rodeado de montañas escarpadas e iluminadas por una cálida luz solar matutina.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/four.jpg" alt="Dos bancos de madera en un césped verde frente a un lago tranquilo durante un vibrante atardecer con tonos naranjas, amarillos y azules sobre las montañas.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/five.jpg" alt="Pequeño bote de madera flotando en un lago cristalino de color turquesa que refleja montañas majestuosas y nubes blancas bajo un cielo azul brillante.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/six.jpg" alt="Muelle y banco de madera frente a un lago tranquilo que refleja montañas nevadas al fondo bajo un cielo azul despejado.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/seven.jpg" alt="Pequeñas casas rurales asentadas en una colina verde y frondosa que se refleja perfectamente en las aguas tranquilas de un lago al pie de las montañas.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        <article class="esbirro">
            <img src="photos/eight.jpg" alt="Atardecer dorado visto desde una colina rocosa con pinos, con el sol poniéndose sobre un extenso valle forestal y un río a lo lejos bajo un cielo nublado.">
            <div class="esclavo">
                <p class="descripcion"></p>
            </div>
        </article>
        
    </main>
